<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e29c"/>
      <stop offset="40%" stop-color="#e6c478"/>
      <stop offset="70%" stop-color="#c69b3c"/>
      <stop offset="100%" stop-color="#8a6a1f"/>
    </linearGradient>
    <linearGradient id="goldHi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a9882f"/>
      <stop offset="50%" stop-color="#f5d782"/>
      <stop offset="100%" stop-color="#a9882f"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="#000"/>
  <!-- Овал-рамка -->
  <ellipse cx="50" cy="50" rx="30" ry="38" fill="none" stroke="url(#gold)" stroke-width="2.2"/>
  <!-- Внешние арки М -->
  <path d="M 26 22 Q 26 60 50 70 Q 74 60 74 22" fill="none" stroke="url(#gold)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Внутренние линии М (V в центре) -->
  <path d="M 36 22 L 50 60 L 64 22" fill="none" stroke="url(#goldHi)" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Центральная вертикаль (стилизованная) -->
  <line x1="50" y1="22" x2="50" y2="55" stroke="url(#gold)" stroke-width="1.6"/>
</svg>
