# Maxim Zakup — production
# Caddy установлен на хост через apt (не в docker), проксирует на 127.0.0.1:8000

services:
  app:
    build: .
    container_name: maxim-zakup
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"  # только локалхост хоста — снаружи доступ через Caddy
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_SA_JSON_CONTENT=${GOOGLE_SA_JSON_CONTENT}
      # Секрет подписи сессий. БЕЗ него app генерит случайный при каждом старте →
      # все логины слетают на каждом рестарте/деплое. Берётся из .env.
      - SESSION_SECRET=${SESSION_SECRET}
      - DB_PATH=/data/data.db
      - DRIVE_SYNC_DIR=/data/drive-sync
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  app-data:
