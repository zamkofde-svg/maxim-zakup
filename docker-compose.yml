# Maxim Zakup — production
# Запуск на VPS: docker compose up -d --build

services:
  app:
    build: .
    container_name: maxim-zakup
    restart: unless-stopped
    expose:
      - "8000"   # только в внутренней сети docker, наружу не пробрасываем
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - GOOGLE_SA_JSON_CONTENT=${GOOGLE_SA_JSON_CONTENT}
      - DB_PATH=/data/data.db
      - DRIVE_SYNC_DIR=/data/drive-sync
    volumes:
      - app-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: maxim-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # сертификаты Let's Encrypt
      - caddy-config:/config
    depends_on:
      - app

volumes:
  app-data:
  caddy-data:
  caddy-config:
