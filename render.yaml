services:
  - type: web
    name: maxim-zakup
    runtime: python
    plan: free
    region: frankfurt
    pythonVersion: "3.11"
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false  # задаётся в UI Render, не в репо
      - key: GOOGLE_SA_JSON_CONTENT
        sync: false  # задаётся в UI Render — content sa.json одной строкой
